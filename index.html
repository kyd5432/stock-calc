<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>주식 매니저 Pro</title>
    <style>
        :root { --blue: #3182f6; --gray-bg: #f2f4f6; --text-main: #191f28; --text-sub: #8b95a1; --red: #f04452; --green: #32d08d; }
        body { font-family: -apple-system, sans-serif; background-color: var(--gray-bg); margin: 0; padding: 20px 15px 100px 15px; color: var(--text-main); -webkit-user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        .header h1 { font-size: 22px; font-weight: bold; margin: 0; }
        .add-btn { background: var(--blue); color: white; border: none; border-radius: 12px; padding: 10px 18px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(49, 130, 246, 0.2); }

        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .stock-name-input { border: none; font-size: 19px; font-weight: bold; color: var(--text-main); width: 70%; outline: none; }
        .del-btn { background: #fee; border: none; color: var(--red); padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }

        .section-title { font-size: 13px; font-weight: 600; color: var(--text-sub); margin: 15px 0 8px 0; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-box { flex: 1; background: #f9fafb; border-radius: 14px; display: flex; align-items: center; padding: 4px 10px; border: 1px solid #f2f2f2; }
        .input-box input { border: none; background: transparent; width: 100%; text-align: center; font-size: 15px; font-weight: bold; padding: 10px 0; outline: none; color: #333; }
        .unit { font-size: 12px; color: var(--text-sub); margin-left: 2px; }

        /* 결과 영역 */
        .result-box { background: #f9fafb; border-radius: 18px; padding: 18px; margin-top: 20px; border: 1px inset rgba(0,0,0,0.02); }
        .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .result-row:last-child { margin-bottom: 0; }
        .val-bold { font-weight: 700; font-size: 16px; }
        .val-total { color: #4e5968; } /* 총액 강조용 */
        .up { color: var(--red); }
        .down { color: var(--blue); }

        .footer-info { text-align: center; color: var(--text-sub); font-size: 12px; margin-top: 30px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <h1>내 주식 계산기</h1>
        <button class="add-btn" onclick="addStock()">+ 종목 추가</button>
    </div>

    <div id="stockList"></div>

    <div class="footer-info">모든 데이터는 기기에 자동으로 저장됩니다.</div>

<script>
    let stocks = [];

    window.onload = () => {
        const saved = localStorage.getItem('myStocksV3');
        if (saved) {
            stocks = JSON.parse(saved);
            render();
        } else {
            addStock();
        }
    }

    function addStock() {
        const newStock = {
            id: Date.now(),
            name: "새 종목",
            curPrice: "",
            curQty: "",
            buyPrice: "",
            buyQty: "",
            targetRate: ""
        };
        stocks.push(newStock);
        save();
        render();
    }

    function deleteStock(id) {
        if(confirm("이 종목을 삭제할까요?")) {
            stocks = stocks.filter(s => s.id !== id);
            save();
            render();
        }
    }

    function updateValue(id, field, value) {
        const stock = stocks.find(s => s.id === id);
        if (stock) {
            stock[field] = value;
            save();
            refreshCard(id);
        }
    }

    function save() {
        localStorage.setItem('myStocksV3', JSON.stringify(stocks));
    }

    function refreshCard(id) {
        const s = stocks.find(s => s.id === id);
        if(!s) return;

        const cP = parseFloat(s.curPrice) || 0;
        const cQ = parseFloat(s.curQty) || 0;
        const bP = parseFloat(s.buyPrice) || 0;
        const bQ = parseFloat(s.buyQty) || 0;
        const tR = parseFloat(s.targetRate) || 0;

        // 1. 총 매수 금액 계산 (보유분 + 추가매수분)
        const totalCost = (cP * cQ) + (bP * bQ);
        
        // 2. 평단가 계산
        const totalQty = cQ + bQ;
        const newAvg = totalQty > 0 ? Math.floor(totalCost / totalQty) : 0;

        // 3. 현재 수익률 계산 (추가 매수가를 현재가로 가정 시)
        let profitRate = 0;
        if (cP > 0 && bP > 0) {
            profitRate = ((bP - cP) / cP) * 100;
        }

        // 4. 목표가 계산 (평단 기준)
        const targetPrice = newAvg > 0 ? Math.floor(newAvg * (1 + tR / 100)) : 0;

        // UI 업데이트
        document.getElementById(`resTotal-${id}`).innerText = totalCost.toLocaleString() + "원";
        document.getElementById(`resAvg-${id}`).innerText = newAvg.toLocaleString() + "원";
        
        const rateEl = document.getElementById(`resRate-${id}`);
        rateEl.innerText = profitRate.toFixed(2) + "%";
        rateEl.className = `val-bold ${profitRate >= 0 ? 'up' : 'down'}`;

        document.getElementById(`resTarget-${id}`).innerText = targetPrice.toLocaleString() + "원";
    }

    function render() {
        const list = document.getElementById('stockList');
        list.innerHTML = '';
        
        stocks.forEach(s => {
            list.innerHTML += `
                <div class="card" id="card-${s.id}">
                    <div class="card-header">
                        <input type="text" class="stock-name-input" value="${s.name}" oninput="updateValue(${s.id}, 'name', this.value)" placeholder="종목명">
                        <button class="del-btn" onclick="deleteStock(${s.id})">삭제</button>
                    </div>

                    <div class="section-title">📉 보유 현황</div>
                    <div class="input-row">
                        <div class="input-box"><input type="number" value="${s.curPrice}" placeholder="현재 평단" oninput="updateValue(${s.id}, 'curPrice', this.value)"></div>
                        <div class="input-box"><input type="number" value="${s.curQty}" placeholder="보유 수량" oninput="updateValue(${s.id}, 'curQty', this.value)"></div>
                    </div>

                    <div class="section-title">💸 추가 매수 / 현재가</div>
                    <div class="input-row">
                        <div class="input-box"><input type="number" value="${s.buyPrice}" placeholder="매수(현재)가" oninput="updateValue(${s.id}, 'buyPrice', this.value)"></div>
                        <div class="input-box"><input type="number" value="${s.buyQty}" placeholder="매수 수량" oninput="updateValue(${s.id}, 'buyQty', this.value)"></div>
                    </div>

                    <div class="section-title">🎯 목표 수익률</div>
                    <div class="input-row">
                        <div class="input-box">
                            <input type="number" value="${s.targetRate}" placeholder="목표 수익률" oninput="updateValue(${s.id}, 'targetRate', this.value)">
                            <span class="unit">%</span>
                        </div>
                    </div>

                    <div class="result-box">
                        <div class="result-row">
                            <span style="color:#8b95a1">총 매수 금액</span>
                            <span class="val-bold val-total" id="resTotal-${s.id}">0원</span>
                        </div>
                        <div class="result-row">
                            <span>예상 평단가</span>
                            <span class="val-bold" id="resAvg-${s.id}">0원</span>
                        </div>
                        <div class="result-row">
                            <span>현재 수익률</span>
                            <span class="val-bold" id="resRate-${s.id}">0%</span>
                        </div>
                        <div class="result-row">
                            <span>목표 매도가</span>
                            <span class="val-bold up" id="resTarget-${s.id}">0원</span>
                        </div>
                    </div>
                </div>
            `;
            refreshCard(s.id);
        });
    }
</script>
</body>
</html>
